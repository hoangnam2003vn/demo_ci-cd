    name: Trien khai len DevOps Classroom
    on:
      push:
        branches: [ "main" ]
      
    jobs:
      Deloy_CD:
        runs-on: ubuntu-latest
        steps:
          - name: Run script
            run: |
              REPO="https://hub.docker.com/repository/docker/namhub/springboot-app"
              CONTAINER_PORT=80
              RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT")
              BODY=$(echo "$RESPONSE" | sed "$d")
              CODE=$(echo "$RESPONSE" | tail -n1)
              echo "Webhook HTTP: $CODE"
              if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
                echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
                echo "::group::Chi tiết webhook JSON"
                echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
                echo "::endgroup::"
                exit 1
              fi
              echo "Deploy thành công."
              echo "::group::Chi tiết webhook JSON"
              echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
              echo "::endgroup::"
